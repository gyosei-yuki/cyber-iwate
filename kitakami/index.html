<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cyber Kitakami VR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script>
      AFRAME.registerComponent("b-dash", {
        init: function () {
          const el = this.el;
          const normalSpeed = 80; // 通常スピード
          const dashSpeed = 2000; // 爆速スピード

          // スペースキーを押した時
          window.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
              el.setAttribute("wasd-controls", "acceleration", dashSpeed);
            }
          });

          // スペースキーを離した時
          window.addEventListener("keyup", (e) => {
            if (e.code === "Space") {
              el.setAttribute("wasd-controls", "acceleration", normalSpeed);
            }
          });
        },
      });
      // 地面にもぐらないためのバリアコンポーネント
      AFRAME.registerComponent("limit-y", {
        schema: {
          min: { type: "number", default: 1 }, // 限界の低さ（1m以下には下がらない）
        },
        // tickは毎フレーム（1秒間に約60回）実行される関数です
        tick: function () {
          const pos = this.el.object3D.position;
          // もし現在の高さ(y)が、設定した限界(min)より低くなったら
          if (pos.y < this.data.min) {
            pos.y = this.data.min; // 強制的に限界の高さに戻す！
          }
        },
      });
      // スマホ画面タッチで前進するコンポーネント
      AFRAME.registerComponent("touch-move", {
        schema: { speed: { type: "number", default: 2.0 } }, // 歩くスピード
        init: function () {
          this.isMoving = false;

          // 画面に指が触れたらフラグON
          window.addEventListener("touchstart", (e) => {
            // HUD（文字）をタップした時は動かないようにする配慮
            if (e.target.id === "hud" || e.target.parentElement.id === "hud")
              return;
            this.isMoving = true;
          });

          // 指が離れたらフラグOFF
          window.addEventListener("touchend", () => {
            this.isMoving = false;
          });
        },
        tick: function () {
          // タッチ中だけ毎フレーム実行される
          if (this.isMoving) {
            const camera = this.el.sceneEl.camera;
            // カメラの向いている方向（ベクトル）を取得
            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyQuaternion(camera.quaternion);

            // 空を飛んだり地面に潜ったりしないようにY軸（高さ）の移動を消す
            direction.y = 0;
            direction.normalize();

            // スピードを掛けてカメラの位置を更新
            this.el.object3D.position.addScaledVector(
              direction,
              this.data.speed,
            );
          }
        },
      });
    </script>
    <style>
      /* サイバーHUDのスタイル */
      #hud {
        position: absolute;
        top: 20px;
        left: 20px;
        padding: 15px;
        background: rgba(0, 0, 0, 0.7);
        color: #00ffff;
        font-family: "Courier New", Courier, monospace;
        border: 1px solid #00ffff;
        border-radius: 5px;
        pointer-events: none; /* VR操作の邪魔をしない */
        display: none; /* 最初は隠しておく */
        box-shadow: 0 0 10px #00ffff;
        z-index: 100;
      }
      #hud h2 {
        margin: 0 0 10px 0;
        font-size: 1.2em;
        border-bottom: 1px solid #00ffff;
      }
      #hud p {
        margin: 5px 0;
        font-size: 1.1em;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <h2 id="hud-name">地域名</h2>
      <p id="hud-pop">人口：0人</p>
    </div>

    <a-scene background="color: #000000" cursor="rayOrigin: mouse">
      <a-plane
        position="128.12935 0 1122.88818"
        rotation="-90 0 0"
        width="3000"
        height="3000"
        color="#00FFFF"
        wireframe="true"
        segments-width="300"
        segments-height="300"
        material=""
        geometry=""
      ></a-plane>

      <a-entity id="city-container" position="0 0 -10"></a-entity>
      <a-camera
        position="120 5 110"
        wasd-controls="fly: true; acceleration: 80"
        touch-move
        b-dash
        limit-y="min: 1"
      ></a-camera>
    </a-scene>

    <script>
      const hud = document.querySelector("#hud");
      const hudName = document.querySelector("#hud-name");
      const hudPop = document.querySelector("#hud-pop");

      fetch("3d.geojson")
        .then((response) => response.json())
        .then((data) => {
          const container = document.querySelector("#city-container");
          const neonColors = [
            "#FFFF00",
            "#00FFFF",
            "#FF00FF",
            "#39FF14",
            "#FF3131",
          ];

          data.features.forEach((feature) => {
            const population =
              feature.properties.JINKO || feature.properties.population || 0;
            const sName = feature.properties.S_NAME || "不明";

            let charSum = 0;
            for (let i = 0; i < sName.length; i++)
              charSum += sName.charCodeAt(i);
            const boxColor = neonColors[charSum % neonColors.length];

            const height = population / 100;

            let lng = 0,
              lat = 0;
            if (
              feature.geometry.type === "Polygon" ||
              feature.geometry.type === "MultiPolygon"
            ) {
              const coords =
                feature.geometry.type === "Polygon"
                  ? feature.geometry.coordinates[0][0]
                  : feature.geometry.coordinates[0][0][0];
              lng = coords[0];
              lat = coords[1];
            }

            const x = (lng - 141.1) * 5000;
            const z = -(lat - 39.7) * 5000;

            const box = document.createElement("a-box");
            box.setAttribute("position", `${x} ${height / 2} ${z}`);
            box.setAttribute("height", height);
            box.setAttribute("width", 5);
            box.setAttribute("depth", 5);
            box.setAttribute("color", boxColor);
            box.setAttribute("wireframe", "true");

            // ★ ここにクリックイベントを追加！
            box.addEventListener("click", function () {
              // HUDを更新して表示
              hudName.innerText = sName;
              hudPop.innerText = `人口：${population.toLocaleString()}人`;
              hud.style.display = "block";

              // 選択された箱を強調（白く光らせるなど）
              this.setAttribute("emissive", "#ffffff");
              this.setAttribute("emissiveIntensity", "0.5");

              // 3秒後に強調を消す
              setTimeout(() => {
                this.setAttribute("emissive", "#000000");
              }, 3000);
            });

            container.appendChild(box);
          });
        })
        .catch((error) => console.error("錬成失敗:", error));
    </script>
  </body>
</html>
